<div class="overlay" (click)="close.emit()"></div>

<div class="panel">
  <div class="panel-header">
    <span class="panel-title">Notifications</span>
    @if (unreadCount() > 0) {
      <span class="badge">{{ unreadCount() }}</span>
    }
    <button class="mark-all" (click)="markAllRead()">Mark all read</button>
    <button class="close-btn" (click)="close.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="panel-body">
    @for (n of notifications(); track n.id) {
      <div class="notification-item" [class.unread]="!n.read" (click)="markRead(n.id)">
        <div class="notif-icon" [class.unread-icon]="!n.read">
          <mat-icon>{{ n.icon }}</mat-icon>
        </div>
        <div class="notif-content">
          <p class="notif-title">{{ n.title }}</p>
          <p class="notif-message">{{ n.message }}</p>
          <span class="notif-time">{{ n.time }}</span>
        </div>
        @if (!n.read) {
          <div class="unread-dot"></div>
        }
      </div>
    }
  </div>

  <div class="panel-footer">View all notifications</div>
</div>
